name: 'Setup mshell'
description: 'Install the mshell concatenative shell language'
inputs:
  version:
    description: >
      Version to install. A release tag (e.g., v0.1.0) or 'latest' downloads a
      pre-built binary. Anything else (a commit SHA or branch name) is built
      from source with Go. Defaults to latest.
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Determine install mode
      id: mode
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ] || [ "${VERSION#v}" != "$VERSION" ]; then
          echo "mode=release" >> $GITHUB_OUTPUT
        else
          echo "mode=source" >> $GITHUB_OUTPUT
        fi

    - name: Determine platform
      id: platform
      if: steps.mode.outputs.mode == 'release'
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   echo "asset=linux_amd64" >> $GITHUB_OUTPUT ;;
          Linux-ARM64) echo "asset=linux_arm64" >> $GITHUB_OUTPUT ;;
          macOS-X64)   echo "asset=darwin_amd64" >> $GITHUB_OUTPUT ;;
          macOS-ARM64) echo "asset=darwin_arm64" >> $GITHUB_OUTPUT ;;
          Windows-X64) echo "asset=windows_amd64" >> $GITHUB_OUTPUT ;;
          *) echo "Unsupported platform: ${{ runner.os }}-${{ runner.arch }}" && exit 1 ;;
        esac

    - name: Download mshell release
      if: steps.mode.outputs.mode == 'release'
      shell: bash
      env:
        ACTION_REPO: ${{ github.action_repository }}
      run: |
        VERSION="${{ inputs.version }}"
        ASSET="${{ steps.platform.outputs.asset }}"

        if [ "$VERSION" = "latest" ]; then
          URL="https://github.com/${ACTION_REPO}/releases/latest/download/${ASSET}.tar.gz"
        else
          URL="https://github.com/${ACTION_REPO}/releases/download/${VERSION}/${ASSET}.tar.gz"
        fi

        mkdir -p "$HOME/.mshell/bin"
        curl -sL "$URL" | tar -xz -C "$HOME/.mshell/bin"

    - name: Checkout mshell source
      if: steps.mode.outputs.mode == 'source'
      shell: bash
      env:
        ACTION_REPO: ${{ github.action_repository }}
      run: |
        VERSION="${{ inputs.version }}"
        SRC_DIR="$RUNNER_TEMP/mshell-src"
        rm -rf "$SRC_DIR"
        git clone "https://github.com/${ACTION_REPO}" "$SRC_DIR"
        git -C "$SRC_DIR" checkout "$VERSION"

    - name: Set up Go
      if: steps.mode.outputs.mode == 'source'
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ runner.temp }}/mshell-src/mshell/go.mod
        cache: false

    - name: Build mshell from source
      if: steps.mode.outputs.mode == 'source'
      shell: bash
      run: |
        SRC_DIR="$RUNNER_TEMP/mshell-src"
        mkdir -p "$HOME/.mshell/bin"

        if [ "${{ runner.os }}" = "Windows" ]; then
          BIN="mshell.exe"
        else
          BIN="mshell"
        fi

        cd "$SRC_DIR/mshell"
        go build -o "$HOME/.mshell/bin/$BIN"

        # Releases ship std.msh in the tarball; for source builds take it from the repo.
        cp "$SRC_DIR/lib/std.msh" "$HOME/.mshell/bin/std.msh"

    - name: Install mshell
      shell: bash
      run: |
        # Create symlinks so both msh and mshell work
        cd "$HOME/.mshell/bin"
        if [ -f mshell ]; then
          ln -sf mshell msh
        elif [ -f msh ]; then
          ln -sf msh mshell
        elif [ -f mshell.exe ]; then
          cp mshell.exe msh.exe
        elif [ -f msh.exe ]; then
          cp msh.exe mshell.exe
        fi

        echo "$HOME/.mshell/bin" >> $GITHUB_PATH

        if [ -f "$HOME/.mshell/bin/msh" ]; then
          MSH_BIN="$HOME/.mshell/bin/msh"
        elif [ -f "$HOME/.mshell/bin/msh.exe" ]; then
          MSH_BIN="$HOME/.mshell/bin/msh.exe"
        elif [ -f "$HOME/.mshell/bin/mshell" ]; then
          MSH_BIN="$HOME/.mshell/bin/mshell"
        else
          MSH_BIN="$HOME/.mshell/bin/mshell.exe"
        fi

        MSH_VERSION="$("$MSH_BIN" --version)"

        # Set config and std directories.
        if [ "${{ runner.os }}" = "Windows" ]; then
          DATA_DIR="$LOCALAPPDATA/msh"
          CONFIG_DIR="$LOCALAPPDATA/msh"
        else
          DATA_DIR="$HOME/.local/share/msh"
          CONFIG_DIR="$HOME/.config/msh"
        fi

        mkdir -p "$DATA_DIR/$MSH_VERSION"
        mkdir -p "$CONFIG_DIR/$MSH_VERSION"

        # std.msh is placed in the bin directory by both install modes; move it into the versioned startup location.
        mv "$HOME/.mshell/bin/std.msh" "$DATA_DIR/$MSH_VERSION/std.msh"

        # Create an empty init.msh so startup succeeds on first run.
        if [ ! -f "$CONFIG_DIR/$MSH_VERSION/init.msh" ]; then
          : > "$CONFIG_DIR/$MSH_VERSION/init.msh"
        fi
