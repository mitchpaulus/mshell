name: 'Setup mshell'
description: 'Install the mshell concatenative shell language'
inputs:
  version:
    description: 'Version to install (e.g., v0.1.0). Defaults to latest.'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Determine platform
      id: platform
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   echo "asset=linux_amd64" >> $GITHUB_OUTPUT ;;
          Linux-ARM64) echo "asset=linux_arm64" >> $GITHUB_OUTPUT ;;
          macOS-X64)   echo "asset=darwin_amd64" >> $GITHUB_OUTPUT ;;
          macOS-ARM64) echo "asset=darwin_arm64" >> $GITHUB_OUTPUT ;;
          Windows-X64) echo "asset=windows_amd64" >> $GITHUB_OUTPUT ;;
          *) echo "Unsupported platform: ${{ runner.os }}-${{ runner.arch }}" && exit 1 ;;
        esac

    - name: Download and install mshell
      shell: bash
      env:
        ACTION_REPO: ${{ github.action_repository }}
      run: |
        VERSION="${{ inputs.version }}"
        ASSET="${{ steps.platform.outputs.asset }}"

        if [ "$VERSION" = "latest" ]; then
          URL="https://github.com/${ACTION_REPO}/releases/latest/download/${ASSET}.tar.gz"
        else
          URL="https://github.com/${ACTION_REPO}/releases/download/${VERSION}/${ASSET}.tar.gz"
        fi

        mkdir -p "$HOME/.mshell/bin"
        curl -sL "$URL" | tar -xz -C "$HOME/.mshell/bin"

        # Create symlinks so both msh and mshell work
        cd "$HOME/.mshell/bin"
        if [ -f mshell ]; then
          ln -sf mshell msh
        elif [ -f msh ]; then
          ln -sf msh mshell
        elif [ -f mshell.exe ]; then
          cp mshell.exe msh.exe
        elif [ -f msh.exe ]; then
          cp msh.exe mshell.exe
        fi

        echo "$HOME/.mshell/bin" >> $GITHUB_PATH

        if [ -f "$HOME/.mshell/bin/msh" ]; then
          MSH_BIN="$HOME/.mshell/bin/msh"
        elif [ -f "$HOME/.mshell/bin/msh.exe" ]; then
          MSH_BIN="$HOME/.mshell/bin/msh.exe"
        elif [ -f "$HOME/.mshell/bin/mshell" ]; then
          MSH_BIN="$HOME/.mshell/bin/mshell"
        else
          MSH_BIN="$HOME/.mshell/bin/mshell.exe"
        fi

        MSH_VERSION="$("$MSH_BIN" --version)"

        if [ "${{ runner.os }}" = "Windows" ]; then
          STARTUP_ROOT="$HOME/.mshell/localappdata"
          DATA_DIR="$STARTUP_ROOT/msh"
          CONFIG_DIR="$STARTUP_ROOT/msh"
          echo "LOCALAPPDATA=$STARTUP_ROOT" >> $GITHUB_ENV
        else
          XDG_DATA_HOME_VALUE="$HOME/.mshell/xdg-data"
          XDG_CONFIG_HOME_VALUE="$HOME/.mshell/xdg-config"
          DATA_DIR="$XDG_DATA_HOME_VALUE/msh"
          CONFIG_DIR="$XDG_CONFIG_HOME_VALUE/msh"
          echo "XDG_DATA_HOME=$XDG_DATA_HOME_VALUE" >> $GITHUB_ENV
          echo "XDG_CONFIG_HOME=$XDG_CONFIG_HOME_VALUE" >> $GITHUB_ENV
        fi

        mkdir -p "$DATA_DIR/lib/$MSH_VERSION"
        mkdir -p "$CONFIG_DIR/init"
        mkdir -p "$CONFIG_DIR/init/$MSH_VERSION"

        # std.msh is included in the release tarball; move it into the startup location.
        mv "$HOME/.mshell/bin/std.msh" "$DATA_DIR/lib/$MSH_VERSION/std.msh"
        touch "$CONFIG_DIR/init/init.msh"
        touch "$CONFIG_DIR/init/$MSH_VERSION/init.msh"
